<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nctl live dashboard</title>
<style>
:root {
  --green: #2e7d32;
  --yellow: #f9a825;
  --red: #c62828;
  --gray: #757575;
  --bg: #f6f7f8;
  --panel: #ffffff;
  --text: #1f2429;
  --muted: #5f6a75;
  --border: #d9dee3;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
}
header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.75rem;
}
header h1 { margin: 0; font-size: 1.15rem; }
#generated-at { color: var(--muted); font-size: 0.85rem; }
#summary { display: flex; flex-wrap: wrap; gap: 0.4rem; }
#conn-status { font-size: 0.8rem; padding: 0.1rem 0.6rem; border-radius: 999px; border: 1px solid var(--border); }
#conn-status.ok { border-color: var(--green); color: var(--green); }
#conn-status.bad { border-color: var(--red); color: var(--red); }
#token-box { margin-left: auto; display: flex; gap: 0.4rem; align-items: center; }
#token-box input { border: 1px solid var(--border); border-radius: 4px; padding: 0.25rem 0.5rem; width: 14rem; }
#token-box button, .actions button {
  border: 1px solid var(--border);
  background: var(--panel);
  border-radius: 4px;
  padding: 0.3rem 0.7rem;
  cursor: pointer;
  font: inherit;
}
#token-box button:hover, .actions button:hover { background: var(--bg); }
.chip {
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0.1rem 0.6rem;
  font-size: 0.8rem;
  background: var(--panel);
}
.chip.status-converged { border-color: var(--green); color: var(--green); }
.chip.status-converging { border-color: var(--yellow); color: #8a6d00; }
.chip.status-drifting { border-color: var(--red); color: var(--red); }
.chip.status-unknown { border-color: var(--gray); color: var(--gray); }
.chip.severity-error { color: var(--red); }
.chip.severity-warning { color: #8a6d00; }
.chip.severity-info { color: var(--muted); }
#layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 22rem;
  gap: 1.25rem;
  padding: 1.25rem 1.5rem;
  max-width: 90rem;
  margin: 0 auto;
  align-items: start;
}
@media (max-width: 60rem) {
  #layout { grid-template-columns: 1fr; }
}
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.9rem 1rem;
}
.actions { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
.actions input { border: 1px solid var(--border); border-radius: 4px; padding: 0.3rem 0.5rem; width: 10rem; }
#action-message { font-size: 0.85rem; color: var(--muted); flex-basis: 100%; }
#errors {
  border: 1px solid var(--red);
  border-left-width: 6px;
  background: #fdecec;
  border-radius: 6px;
  padding: 0.75rem 1rem;
  margin-bottom: 1.25rem;
}
#errors h2 { margin: 0 0 0.5rem; font-size: 1rem; color: var(--red); }
.error-line { font-size: 0.9rem; overflow-wrap: anywhere; }
.error-line code { color: var(--red); }
#targets {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(17rem, 1fr));
  gap: 0.9rem;
  align-items: start;
}
.tile {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 6px solid var(--gray);
  border-radius: 6px;
}
.tile.status-converged { border-left-color: var(--green); }
.tile.status-converging { border-left-color: var(--yellow); }
.tile.status-drifting { border-left-color: var(--red); }
.tile.status-unknown { border-left-color: var(--gray); }
.tile > summary {
  cursor: pointer;
  padding: 0.7rem 0.9rem;
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.5rem;
  list-style-position: outside;
}
.tile-kind { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
.tile-name { font-weight: 600; overflow-wrap: anywhere; }
.tile-status { margin-left: auto; font-size: 0.85rem; }
.tile.status-converged .tile-status { color: var(--green); }
.tile.status-converging .tile-status { color: #8a6d00; }
.tile.status-drifting .tile-status { color: var(--red); }
.tile.status-unknown .tile-status { color: var(--gray); }
.tile-count { color: var(--muted); font-size: 0.8rem; }
.diffs { list-style: none; margin: 0; padding: 0 0.9rem 0.8rem; }
.diff { border-top: 1px solid var(--border); padding: 0.6rem 0; }
.diff-head { display: flex; align-items: baseline; gap: 0.5rem; }
.badge {
  border-radius: 3px;
  padding: 0 0.35rem;
  font-size: 0.72rem;
  text-transform: uppercase;
  color: #fff;
  background: var(--gray);
}
.badge.severity-error { background: var(--red); }
.badge.severity-warning { background: var(--yellow); color: #3d3000; }
.badge.severity-info { background: var(--gray); }
.diff-code { font-size: 0.8rem; color: var(--muted); overflow-wrap: anywhere; }
.diff-message { margin: 0.35rem 0; overflow-wrap: anywhere; }
.evidence { font-size: 0.8rem; margin: 0.3rem 0; }
.evidence-label { color: var(--muted); text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.05em; }
.evidence pre {
  margin: 0.15rem 0 0;
  padding: 0.4rem 0.6rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow-x: auto;
}
.diff-sources { font-size: 0.75rem; color: var(--muted); }
.no-diffs { padding: 0 0.9rem 0.8rem; margin: 0; color: var(--muted); font-size: 0.85rem; }
.empty { color: var(--muted); font-size: 0.9rem; }
#sidebar h2 { margin: 0 0 0.6rem; font-size: 1rem; }
#op-list { list-style: none; margin: 0 0 1rem; padding: 0; display: flex; flex-direction: column; gap: 0.4rem; max-height: 16rem; overflow-y: auto; }
#op-list li {
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.4rem 0.6rem;
  font-size: 0.8rem;
  cursor: pointer;
}
#op-list li:hover { background: var(--bg); }
#op-list li.selected { border-color: var(--text); background: var(--bg); }
#op-list .op-id { font-weight: 600; overflow-wrap: anywhere; }
#op-list .op-meta { color: var(--muted); }
#op-list .op-state-running { color: var(--yellow); }
#op-list .op-state-finished-ok { color: var(--green); }
#op-list .op-state-finished-fail { color: var(--red); }
#event-tail-title { font-size: 0.85rem; color: var(--muted); margin: 0 0 0.4rem; }
#event-tail {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 22rem;
  overflow-y: auto;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.75rem;
}
#event-tail li { border-top: 1px solid var(--border); padding: 0.3rem 0; overflow-wrap: anywhere; }
#event-tail li:first-child { border-top: none; }
#event-tail .ev-level-warning { color: #8a6d00; }
#event-tail .ev-level-error { color: var(--red); }
footer {
  padding: 1rem 1.5rem 2rem;
  max-width: 90rem;
  margin: 0 auto;
  color: var(--muted);
  font-size: 0.85rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1.25rem;
}
.source-error { flex-basis: 100%; color: var(--red); overflow-wrap: anywhere; }
</style>
</head>
<body>
<header>
  <h1>nctl live dashboard</h1>
  <span id="generated-at"></span>
  <div id="summary"></div>
  <span id="conn-status">disconnected</span>
  <div id="token-box">
    <input id="token-input" type="password" placeholder="serve token" autocomplete="off">
    <button id="token-save">connect</button>
  </div>
</header>
<div id="layout">
  <div>
    <div class="panel actions">
      <button id="action-refresh-drift">refresh drift</button>
      <input id="reconcile-host" type="text" placeholder="host (optional)">
      <button id="action-reconcile-plan">reconcile (plan)</button>
      <span id="action-message"></span>
    </div>
    <section id="errors" hidden></section>
    <section id="targets"></section>
  </div>
  <div id="sidebar" class="panel">
    <h2>operations</h2>
    <ul id="op-list"></ul>
    <p id="event-tail-title">select an operation to see its event tail</p>
    <ul id="event-tail"></ul>
  </div>
</div>
<footer id="sources"></footer>
<script>
(function () {
  "use strict";
  var STATUS_ORDER = ["converged", "converging", "drifting", "unknown"];
  var KIND_ORDER = ["node", "service"];
  var REFRESH_EVENTS = ["finished", "drift_resolved", "observation_completed"];
  var TOKEN_KEY = "nctl_serve_token";
  var MAX_TAIL = 300;

  var state = {
    token: sessionStorage.getItem(TOKEN_KEY) || "",
    ws: null,
    selectedOperationId: null,
    operations: [],
    tailByOperation: {},
  };

  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function kindRank(kind) {
    var index = KIND_ORDER.indexOf(kind);
    return index === -1 ? KIND_ORDER.length : index;
  }

  function setConnStatus(ok, text) {
    var badge = document.getElementById("conn-status");
    badge.textContent = text;
    badge.className = ok ? "ok" : "bad";
  }

  function setActionMessage(text) {
    document.getElementById("action-message").textContent = text || "";
  }

  // -- auth --------------------------------------------------------------

  function authFetch(path, opts) {
    opts = opts || {};
    var headers = Object.assign({}, opts.headers || {});
    if (state.token) headers["Authorization"] = "Bearer " + state.token;
    return fetch(path, Object.assign({}, opts, { headers: headers })).then(function (response) {
      if (response.status === 401) {
        setConnStatus(false, "unauthorized - check token");
      }
      return response;
    });
  }

  document.getElementById("token-save").addEventListener("click", function () {
    state.token = document.getElementById("token-input").value.trim();
    sessionStorage.setItem(TOKEN_KEY, state.token);
    document.getElementById("token-input").value = "";
    reconnect();
  });

  if (state.token) document.getElementById("token-input").placeholder = "serve token (saved)";

  // -- drift rendering (same visual language as the Phase 3 static dashboard) --

  function renderDriftEnvelope(envelope) {
    var data = envelope.data || {};
    document.getElementById("generated-at").textContent =
      "generated " + (data.generated_at || envelope.generated_at || "?");

    var strip = document.getElementById("summary");
    clear(strip);
    STATUS_ORDER.forEach(function (status) {
      var count = (data.summary || {})[status] || 0;
      strip.appendChild(el("span", "chip status-" + status, status + " " + count));
    });
    var severities = data.severity_summary || {};
    ["error", "warning", "info"].forEach(function (severity) {
      strip.appendChild(el("span", "chip severity-" + severity, severity + " " + (severities[severity] || 0)));
    });

    var panel = document.getElementById("errors");
    clear(panel);
    panel.hidden = envelope.ok !== false;
    if (!panel.hidden) {
      panel.appendChild(el("h2", null, "drift run failed - statuses below may be empty or stale"));
      (envelope.errors || []).forEach(function (err) {
        var line = el("div", "error-line");
        line.appendChild(el("code", null, err.code));
        line.appendChild(el("span", null, " " + err.message));
        panel.appendChild(line);
      });
    }

    renderTargets(data.targets || []);
    renderSources(data.sources || {});
  }

  function evidenceBlock(label, value) {
    if (value === null || value === undefined) return null;
    if (typeof value === "object" && Object.keys(value).length === 0) return null;
    var box = el("div", "evidence");
    box.appendChild(el("span", "evidence-label", label));
    box.appendChild(el("pre", null, JSON.stringify(value, null, 2)));
    return box;
  }

  function renderDiff(diff) {
    var item = el("li", "diff");
    var head = el("div", "diff-head");
    head.appendChild(el("span", "badge severity-" + diff.severity, diff.severity));
    head.appendChild(el("code", "diff-code", diff.code));
    item.appendChild(head);
    item.appendChild(el("p", "diff-message", diff.message));
    var desired = evidenceBlock("desired", diff.desired);
    if (desired) item.appendChild(desired);
    var actual = evidenceBlock("actual", diff.actual);
    if (actual) item.appendChild(actual);
    if (diff.sources && diff.sources.length) {
      item.appendChild(el("div", "diff-sources", "sources: " + diff.sources.join(", ")));
    }
    return item;
  }

  function renderTile(targetStatus) {
    var tile = el("details", "tile status-" + targetStatus.status);
    var target = targetStatus.target || {};
    var summary = el("summary");
    summary.appendChild(el("span", "tile-kind", target.kind || "?"));
    summary.appendChild(el("span", "tile-name", target.slug || target.name || target.id || "?"));
    summary.appendChild(el("span", "tile-status", targetStatus.status));
    summary.appendChild(el("span", "tile-count", targetStatus.diffs.length + " diff(s)"));
    tile.appendChild(summary);
    if (targetStatus.diffs.length) {
      var list = el("ul", "diffs");
      targetStatus.diffs.forEach(function (diff) { list.appendChild(renderDiff(diff)); });
      tile.appendChild(list);
    } else {
      tile.appendChild(el("p", "no-diffs", "no diffs"));
    }
    return tile;
  }

  function renderTargets(targets) {
    var section = document.getElementById("targets");
    clear(section);
    targets = targets.slice();
    targets.sort(function (a, b) { return kindRank(a.target.kind) - kindRank(b.target.kind); });
    targets.forEach(function (targetStatus) { section.appendChild(renderTile(targetStatus)); });
    if (!targets.length) section.appendChild(el("p", "empty", "no targets in this drift payload"));
  }

  function renderSources(sources) {
    var footer = document.getElementById("sources");
    clear(footer);
    footer.appendChild(el("span", null, "fetched: " + (sources.fetched_at || "-")));
    footer.appendChild(el("span", null, "observed dumps: " + (sources.observed_dump_count || 0)));
    (sources.observed_errors || []).forEach(function (message) {
      footer.appendChild(el("div", "source-error", message));
    });
  }

  function loadDrift() {
    if (!state.token) return;
    authFetch("/api/v1/drift").then(function (response) {
      if (response.status === 503) {
        document.getElementById("targets").innerHTML = "";
        document.getElementById("targets").appendChild(el("p", "empty", "no drift snapshot persisted yet"));
        return null;
      }
      if (!response.ok) return null;
      return response.json();
    }).then(function (envelope) {
      if (envelope) renderDriftEnvelope(envelope);
    }).catch(function () {});
  }

  // -- operations sidebar -------------------------------------------------

  function opStateClass(op) {
    if (op.state !== "finished") return "op-state-running";
    return op.ok ? "op-state-finished-ok" : "op-state-finished-fail";
  }

  function renderOperations() {
    var list = document.getElementById("op-list");
    clear(list);
    state.operations.forEach(function (op) {
      var item = el("li");
      if (op.operation_id === state.selectedOperationId) item.className = "selected";
      var idLine = el("div", "op-id", op.operation_id);
      var metaLine = el("div", "op-meta " + opStateClass(op), op.op + " - " + op.state + (op.result ? " (" + op.result + ")" : ""));
      item.appendChild(idLine);
      item.appendChild(metaLine);
      item.addEventListener("click", function () { selectOperation(op.operation_id); });
      list.appendChild(item);
    });
    if (!state.operations.length) list.appendChild(el("li", "empty", "no operations yet"));
  }

  function loadOperations() {
    if (!state.token) return;
    authFetch("/api/v1/operations?limit=20").then(function (response) {
      if (!response.ok) return null;
      return response.json();
    }).then(function (body) {
      if (!body) return;
      state.operations = body.operations || [];
      setConnStatus(true, state.ws && state.ws.readyState === WebSocket.OPEN ? "live" : "connected");
      renderOperations();
    }).catch(function () {});
  }

  function selectOperation(operationId) {
    state.selectedOperationId = operationId;
    renderOperations();
    document.getElementById("event-tail-title").textContent = "event tail: " + operationId;
    authFetch("/api/v1/operations/" + encodeURIComponent(operationId) + "/events").then(function (response) {
      if (!response.ok) return null;
      return response.json();
    }).then(function (body) {
      if (!body) return;
      state.tailByOperation[operationId] = body.events || [];
      renderEventTail();
    }).catch(function () {});
  }

  function renderEventTail() {
    var list = document.getElementById("event-tail");
    clear(list);
    var events = state.tailByOperation[state.selectedOperationId] || [];
    events.slice(-MAX_TAIL).forEach(function (record) {
      var line = el("li", "ev-level-" + record.level);
      line.textContent = "[" + record.seq + "] " + record.event + " - " + record.message;
      list.appendChild(line);
    });
  }

  function appendEventToTail(record) {
    var tail = state.tailByOperation[record.operation_id];
    if (!tail) return; // only accumulate for operations the sidebar already knows about
    tail.push(record);
    if (tail.length > MAX_TAIL) tail.shift();
    if (record.operation_id === state.selectedOperationId) renderEventTail();
  }

  // -- websocket event stream ---------------------------------------------

  function wsUrl() {
    var proto = window.location.protocol === "https:" ? "wss:" : "ws:";
    return proto + "//" + window.location.host + "/api/v1/ws?token=" + encodeURIComponent(state.token);
  }

  function connectWs() {
    if (!state.token) return;
    var socket = new WebSocket(wsUrl());
    state.ws = socket;
    socket.addEventListener("open", function () {
      socket.send(JSON.stringify({ subscribe: "all", after_seq: -1 }));
      setConnStatus(true, "live");
    });
    socket.addEventListener("message", function (event) {
      var record;
      try {
        record = JSON.parse(event.data);
      } catch (err) {
        return;
      }
      appendEventToTail(record);
      if (REFRESH_EVENTS.indexOf(record.event) !== -1) {
        loadOperations();
        if (record.op === "drift" || record.op === "reconcile" || record.op === "dashboard") loadDrift();
      }
    });
    socket.addEventListener("close", function () {
      if (state.ws === socket) setConnStatus(false, "disconnected");
    });
    socket.addEventListener("error", function () {
      setConnStatus(false, "connection error");
    });
  }

  function reconnect() {
    if (state.ws) {
      try { state.ws.close(); } catch (err) { /* already closed */ }
      state.ws = null;
    }
    if (!state.token) {
      setConnStatus(false, "no token");
      return;
    }
    setConnStatus(false, "connecting...");
    loadDrift();
    loadOperations();
    connectWs();
  }

  // -- actions --------------------------------------------------------------

  function submitOperation(op, params) {
    setActionMessage("submitting " + op + " ...");
    authFetch("/api/v1/operations", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ op: op, params: params || {} }),
    }).then(function (response) {
      return response.json().then(function (body) { return { status: response.status, body: body }; });
    }).then(function (result) {
      if (result.status === 202) {
        setActionMessage(op + " submitted: " + result.body.operation_id);
        loadOperations();
        selectOperation(result.body.operation_id);
      } else {
        setActionMessage(op + " failed: " + (result.body.message || result.status));
      }
    }).catch(function () {
      setActionMessage(op + " failed: network error");
    });
  }

  document.getElementById("action-refresh-drift").addEventListener("click", function () {
    submitOperation("drift", {});
  });
  document.getElementById("action-reconcile-plan").addEventListener("click", function () {
    var host = document.getElementById("reconcile-host").value.trim();
    submitOperation("reconcile", host ? { host: host } : {});
  });

  reconnect();
})();
</script>
</body>
</html>
