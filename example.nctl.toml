# Copy to nctl.toml at the pj-clusterintent repo root (git-ignored) and adjust.
# Never put an API token in this file; use token_env or token_file.

[nautobot]
url = "http://localhost:8000"
token_env = "NAUTOBOT_TOKEN"
# token_file = "~/.config/nctl/nautobot_token"

[inventory]
dumps_dir = "~/.local/state/nctl/dumps"

[events]
log_dir = "~/.local/state/nctl/events"

[ansible]
# ansible_agdev checkout, relative to this file's directory.
playbook_dir = "ansible_agdev"
# Absolute paths are accepted; relative paths resolve inside playbook_dir.
inventory = "inventories/generated/production.yml"

[repo]
# pj-clusterintent checkout, relative to this file's directory.
root = "."

[reconcile]
max_rounds = 3
job_poll_interval_seconds = 2
job_timeout_seconds = 300
ansible_timeout_seconds = 1800
remote_report_path = "/var/lib/nodeutils/inventory.json"
lock_path = "~/.local/state/nctl/reconcile.lock"

[dashboard]
# Where `nctl dashboard` writes index.html + drift.json.
out_dir = "~/.local/state/nctl/dashboard"
# Where that directory is served on the LAN, if anywhere (informational only;
# surfaced in output and used as the nintent dashboard link target).
# url = "http://example.lan/nctl-dashboard/"
